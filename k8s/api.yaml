apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadsourcing-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leadsourcing-api
  template:
    metadata:
      labels:
        app: leadsourcing-api
    spec:
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/cazalead/leadsourcing/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: leadsourcing-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1.5Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: leadsourcing-api-svc
  namespace: default
spec:
  selector:
    app: leadsourcing-api
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
